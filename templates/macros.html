{% macro pagination(page, has_next, total_pages, endpoint) %}
<div style="margin-top: 20px;">

    {# Previous #}
    {% if page > 1 %}
        <a href="{{ url_for(endpoint, page=page-1) }}">⬅ Previous</a>
    {% else %}
        <span style="color: gray;">⬅ Previous</span>
    {% endif %}

    <span style="margin: 0 10px;">Page {{ page }} of {{ total_pages }}</span>

    {# Next #}
    {% if has_next %}
        <a href="{{ url_for(endpoint, page=page+1) }}">Next ➡</a>
    {% else %}
        <span style="color: gray;">Next ➡</span>
    {% endif %}

</div>
{% endmacro %}
