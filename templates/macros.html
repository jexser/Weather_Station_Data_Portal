{% macro pagination(page, has_next, total_pages, endpoint) %}
<div class="pagination">
    {% if page > 1 %}
        <a href="{{ url_for(endpoint, page=page-1) }}">← Previous</a>
    {% else %}
        <span class="disabled">← Previous</span>
    {% endif %}

    <span class="page-info">Page {{ page }} of {{ total_pages }}</span>

    {% if has_next %}
        <a href="{{ url_for(endpoint, page=page+1) }}">Next →</a>
    {% else %}
        <span class="disabled">Next →</span>
    {% endif %}
</div>
{% endmacro %}
