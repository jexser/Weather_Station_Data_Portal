
<!DOCTYPE html>
<html>
<head>
    <title>Weather Station Data Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
</head>

<body>
    <h1>Insights</h1>
    <form method="get" action="{{ url_for('ui.insights_ui') }}">
        <label for="station_name_search">Station: </label>
        <input type="text" id="station_name_search" name="station_name_search" placeholder="Search station..."/>
        <!-- TODO: refactor to remove extra field and store value in 'station_name_search' -->
        <input type="text" id="station_id" name="station_id"> 
        <div id="results" class="combo-dropdown"></div>
        <br><br>
        <label for="date">Date (optional)</label>
        <input type="text" id="date" name="date" placeholder="Format: mm-dd (e.g. 02-27)"/>
        <input type="submit" id="load_insights" value="Load insights"/>
    </form>
    <hr>
    <table border="1">
        <thead>
            <th>Insight</th>
            <th>Value</th>
        </thead>
        <tbody>
            <tr>
                <td>Hottest year: </td>
                <td>{{ hottest_year }}</td>
            </tr>
            <tr>
                <td>Coldest year: </td>
                <td>{{ coldest_year }}</td>
            </tr>
            <tr>
                <td>Hottest day: </td>
                <td>{{ hottest_day }}</td>
            </tr>
            <tr>
                <td>Coldest day: </td>
                <td>{{ coldest_day }}</td>
            </tr>
            <tr>
                <td>Avg Temp (07-11): </td>
                <td>{{ avg_temp }} °C</td>
            </tr>
            <tr>
                <td>Temperature variability: </td>
                <td>±{{ std_temp }} °C</td>
            </tr>
            <tr>
                <td>Missing Records: </td>
                <td>{{ missing_records }}</td>
            </tr>
        </tbody>
    </table>

    <script src="{{ url_for('static', filename='scripts/combo-search.js') }}" defer></script>
</body>
